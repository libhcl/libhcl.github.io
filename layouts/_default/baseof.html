<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ if .IsHome }}{{ .Site.Title }} &middot; HCL in C{{ else }}{{ .Title }} &middot; {{ .Site.Title }}{{ end }}</title>
  <meta name="description" content="{{ .Description | default .Site.Params.description }}">
  {{/* set the saved theme before paint to avoid a flash of the wrong theme */}}
  <script>(function(){try{var t=localStorage.getItem("theme");if(t){document.documentElement.dataset.theme=t;}}catch(e){}})();</script>
  <link rel="stylesheet" href="{{ "css/style.css" | relURL }}">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="{{ "/" | relURL }}">libhcl</a>
    <nav>
      {{ range .Site.Menus.main }}<a href="{{ .URL | relLangURL }}">{{ if in .URL "github.com" }}{{ partial "gh-icon.html" . }} {{ end }}{{ .Name }}</a>{{ end }}
    </nav>
    <button id="theme-toggle" class="theme-toggle" type="button"
            aria-label="Toggle light/dark theme" title="Toggle light/dark theme"></button>
  </header>
  <main class="content">
    {{ block "main" . }}{{ end }}
  </main>
  <footer class="site-footer">{{ .Site.Params.footer | safeHTML }}</footer>
  <script>
  (function () {
    var btn = document.getElementById("theme-toggle");
    var mq = window.matchMedia("(prefers-color-scheme: light)");
    function current() {
      return document.documentElement.dataset.theme || (mq.matches ? "light" : "dark");
    }
    function paint() { btn.textContent = current() === "dark" ? "☀" : "☾"; }
    btn.addEventListener("click", function () {
      var next = current() === "dark" ? "light" : "dark";
      document.documentElement.dataset.theme = next;
      try { localStorage.setItem("theme", next); } catch (e) {}
      paint();
    });
    mq.addEventListener("change", paint);
    paint();
  })();
  </script>
</body>
</html>
