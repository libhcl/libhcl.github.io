baseURL = "https://libhcl.github.io/"
title = "libhcl"
disableKinds = ["taxonomy", "term", "RSS"]

[languages.en]
  locale = "en-US"
  weight = 1
enableGitInfo = false

[params]
  description = "Small, dependency-free HCL parsing libraries in C."
  footer = "libhcl &middot; BSD-3-Clause &middot; hand-written, zero-dependency C"

[markup.goldmark.renderer]
  unsafe = true # allow raw HTML in markdown (badges, etc.)

[markup.highlight]
  noClasses = false
  guessSyntax = true

